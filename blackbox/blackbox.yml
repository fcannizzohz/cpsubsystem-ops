modules:
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4

  # HTTP probe variant – useful if you want to probe the /hazelcast/health/ready endpoint
  http_hazelcast_health:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1"]
      valid_status_codes: [200]
      method: GET
      preferred_ip_protocol: ip4
      fail_if_not_ssl: false
